<svg viewBox="0 0 1000 600" width="1000" height="600" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, Helvetica Neue, Arial, sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#a0b0c0" flood-opacity="0.2" />
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#f59e0b" flood-opacity="0.25" />
    </filter>
    <filter id="icon-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#a0b0c0" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="#fafcff" />

  <!-- Titles -->
  <text x="500" y="70" font-size="34" font-weight="bold" fill="#0f172a" text-anchor="middle">How We Run Python</text>

  <!-- ================= CARD 1 ================= -->
  <!-- Box -->
  <rect x="60" y="190" width="260" height="270" rx="16" fill="#f5f9ff" stroke="#d4e4f7" stroke-width="2" filter="url(#shadow)" />
  <text x="190" y="390" font-size="140" opacity="0.08" text-anchor="middle">💻</text>
  
  <text x="190" y="250" font-size="22" font-weight="bold" fill="#00477a" text-anchor="middle">Local Install</text>
  <text x="190" y="275" font-size="14" fill="#00477a" font-weight="bold" text-anchor="middle">Directly on your PC</text>

  <text x="80" y="335" font-size="14" fill="#00477a">
    <tspan x="80" dy="0">✔ Complete control</tspan>
    <tspan x="80" dy="30">✔ Runs offline natively</tspan>
    <tspan x="80" dy="30">❌ Setup can be tricky</tspan>
    <tspan x="98" dy="20">for absolute beginners</tspan>
  </text>

  <!-- Icon Pad -->
  <circle cx="190" cy="190" r="25" fill="#ffffff" stroke="#d4e4f7" stroke-width="2" filter="url(#icon-shadow)" />
  <text x="190" y="198" font-size="24" text-anchor="middle">💻</text>

  <!-- ================= OR BUBBLE 1 ================= -->
  <circle cx="345" cy="325" r="16" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="345" y="330" font-size="11" font-weight="bold" fill="#64748b" text-anchor="middle">OR</text>

  <!-- ================= CARD 2 ================= -->
  <!-- Box -->
  <rect x="370" y="190" width="260" height="270" rx="16" fill="#fcf5ff" stroke="#f3dcfb" stroke-width="2" filter="url(#shadow)" />
  <text x="500" y="390" font-size="140" opacity="0.08" text-anchor="middle">☁️</text>

  <text x="500" y="250" font-size="22" font-weight="bold" fill="#581c87" text-anchor="middle">Cloud PC</text>
  <text x="500" y="275" font-size="14" fill="#581c87" font-weight="bold" text-anchor="middle">GitHub Codespaces</text>

  <text x="390" y="335" font-size="14" fill="#581c87">
    <tspan x="390" dy="0">✔ Accessible anywhere</tspan>
    <tspan x="390" dy="30">✔ Pre-configured dev tools</tspan>
    <tspan x="390" dy="30">❌ Overkill for basic scripts</tspan>
  </text>

  <!-- Icon Pad -->
  <circle cx="500" cy="190" r="25" fill="#ffffff" stroke="#f3dcfb" stroke-width="2" filter="url(#icon-shadow)" />
  <text x="500" y="198" font-size="24" text-anchor="middle">☁️</text>

  <!-- ================= OR BUBBLE 2 ================= -->
  <circle cx="655" cy="325" r="16" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="655" y="330" font-size="11" font-weight="bold" fill="#64748b" text-anchor="middle">OR</text>

  <!-- ================= CARD 3 (RECOMMENDED) ================= -->
  <!-- Box -->
  <rect x="680" y="170" width="260" height="310" rx="16" fill="#fffcf2" stroke="#fbbf24" stroke-width="4" filter="url(#glow)" />
  <text x="810" y="390" font-size="140" opacity="0.08" text-anchor="middle">📓</text>

  <text x="810" y="235" font-size="22" font-weight="bold" fill="#b45309" text-anchor="middle">Cloud Notebooks</text>
  <text x="810" y="260" font-size="14" fill="#b45309" font-weight="bold" text-anchor="middle">Google Colab / Jupyter</text>

  <text x="700" y="315" font-size="14" fill="#b45309">
    <tspan x="700" dy="0">✔ Code runs block-by-block</tspan>
    <tspan x="700" dy="30">✔ Zero setup required (Free!)</tspan>
    <tspan x="700" dy="30">✔ Perfect for scraping data</tspan>
  </text>

  <!-- Recommended Badge -->
  <rect x="715" y="420" width="190" height="32" rx="16" fill="#f59e0b" filter="url(#shadow)" />
  <text x="810" y="441" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">★ HIGHLY RECOMMENDED</text>

  <!-- Icon Pad -->
  <circle cx="810" cy="170" r="30" fill="#ffffff" stroke="#fbbf24" stroke-width="3" filter="url(#icon-shadow)" />
  <text x="810" y="180" font-size="30" text-anchor="middle">📓</text>

  <!-- Footer -->
  <text x="960" y="570" font-size="14" font-weight="bold" fill="#94a3b8" text-anchor="end">@alhrkn</text>

</svg>
