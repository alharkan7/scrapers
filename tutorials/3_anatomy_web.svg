<svg viewBox="0 0 1000 650" width="1000" height="650" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, Helvetica Neue, Arial, sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#a0b0c0" flood-opacity="0.2" />
    </filter>
    <filter id="icon-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#a0b0c0" flood-opacity="0.25" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="650" fill="#fafcff" />

  <!-- Titles -->
  <text x="500" y="60" font-size="34" font-weight="bold" fill="#0f172a" text-anchor="middle">Anatomy of a Web Page</text>

  <!-- Grouping Backgrounds -->
  <rect x="50" y="125" width="380" height="480" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6" rx="16" />
  <text x="240" y="115" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">RAW SOURCE CODE (What Python Sees)</text>

  <rect x="590" y="125" width="360" height="480" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6" rx="16" />
  <text x="770" y="115" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">RENDERED LAYOUT (What Humans See)</text>

  <!-- Connections -->
  <path d="M 400 220 C 450 220, 450 350, 475 350" fill="none" stroke="#cbd5e1" stroke-width="4" />
  <path d="M 400 370 L 475 370" fill="none" stroke="#cbd5e1" stroke-width="4" />
  <path d="M 400 520 C 450 520, 450 390, 475 390" fill="none" stroke="#cbd5e1" stroke-width="4" />
  
  <path d="M 545 370 L 615 370" fill="none" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Render Engine Node -->
  <circle cx="510" cy="370" r="35" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
  <text x="510" y="374" font-size="11" font-weight="bold" fill="#64748b" text-anchor="middle">BROWSER</text>
  <text x="510" y="388" font-size="11" font-weight="bold" fill="#64748b" text-anchor="middle">ENGINE</text>

  <!-- ================= HTML CARD ================= -->
  <rect x="80" y="160" width="320" height="120" rx="12" fill="#f5f9ff" stroke="#d4e4f7" stroke-width="2" filter="url(#shadow)" />
  <text x="350" y="250" font-size="80" opacity="0.08" text-anchor="middle">🏗️</text>
  
  <text x="120" y="200" font-size="18" font-weight="bold" fill="#00477a">HTML (The Skeleton)</text>
  <text x="120" y="225" font-size="13" fill="#00477a">
    <tspan x="120" dy="0">Defines the underlying structure and</tspan>
    <tspan x="120" dy="18">core content (text, links, images).</tspan>
  </text>
  
  <circle cx="80" cy="220" r="22" fill="#ffffff" stroke="#d4e4f7" stroke-width="2" filter="url(#icon-shadow)" />
  <text x="80" y="228" font-size="20" text-anchor="middle">🏗️</text>

  <!-- ================= CSS CARD ================= -->
  <rect x="80" y="310" width="320" height="120" rx="12" fill="#fff9f9" stroke="#f6dce0" stroke-width="2" filter="url(#shadow)" />
  <text x="350" y="400" font-size="80" opacity="0.08" text-anchor="middle">🎨</text>

  <text x="120" y="350" font-size="18" font-weight="bold" fill="#8f000b">CSS (The Clothing)</text>
  <text x="120" y="375" font-size="13" fill="#8f000b">
    <tspan x="120" dy="0">Handles the visual styling and layout</tspan>
    <tspan x="120" dy="18">rules (colors, fonts, spacing).</tspan>
  </text>

  <circle cx="80" cy="370" r="22" fill="#ffffff" stroke="#f6dce0" stroke-width="2" filter="url(#icon-shadow)" />
  <text x="80" y="378" font-size="20" text-anchor="middle">🎨</text>

  <!-- ================= JS CARD ================= -->
  <rect x="80" y="460" width="320" height="120" rx="12" fill="#fefcf5" stroke="#f3e4c4" stroke-width="2" filter="url(#shadow)" />
  <text x="350" y="550" font-size="80" opacity="0.08" text-anchor="middle">⚡</text>

  <text x="120" y="500" font-size="18" font-weight="bold" fill="#7a5900">JavaScript (The Muscles)</text>
  <text x="120" y="525" font-size="13" fill="#7a5900">
    <tspan x="120" dy="0">Controls the dynamic interactivity</tspan>
    <tspan x="120" dy="18">(animations, loading new data).</tspan>
  </text>

  <circle cx="80" cy="520" r="22" fill="#ffffff" stroke="#f3e4c4" stroke-width="2" filter="url(#icon-shadow)" />
  <text x="80" y="528" font-size="20" text-anchor="middle">⚡</text>

  <!-- ================= BROWSER RENDER (RIGHT CARD) ================= -->
  <rect x="620" y="160" width="300" height="420" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)" />
  
  <!-- Browser Chrome -->
  <path d="M 620 200 L 920 200" stroke="#cbd5e1" stroke-width="2" />
  <circle cx="640" cy="180" r="6" fill="#ef4444" />
  <circle cx="660" cy="180" r="6" fill="#f59e0b" />
  <circle cx="680" cy="180" r="6" fill="#22c55e" />
  
  <rect x="695" y="170" width="150" height="20" rx="10" fill="#f1f5f9" />
  <text x="770" y="184" font-size="10" fill="#94a3b8" text-anchor="middle">example.com</text>

  <!-- Wireframe Website Content -->
  <!-- Hero -->
  <rect x="640" y="220" width="260" height="120" rx="8" fill="#e0e7ff" />
  <text x="770" y="295" font-size="50" fill="#a5b4fc" text-anchor="middle">🌄</text>

  <!-- Text Content -->
  <rect x="640" y="360" width="160" height="18" rx="4" fill="#94a3b8" />
  <rect x="640" y="395" width="130" height="10" rx="4" fill="#cbd5e1" />
  <rect x="640" y="415" width="150" height="10" rx="4" fill="#cbd5e1" />
  <rect x="640" y="435" width="110" height="10" rx="4" fill="#cbd5e1" />
  
  <rect x="640" y="465" width="90" height="28" rx="6" fill="#4f46e5" />
  <text x="685" y="483" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Click Me</text>

  <!-- Side Cards -->
  <rect x="820" y="360" width="80" height="85" rx="6" fill="#f1f5f9" />
  <rect x="830" y="370" width="60" height="10" rx="3" fill="#cbd5e1" />
  <rect x="830" y="390" width="40" height="8" rx="3" fill="#cbd5e1" />

  <rect x="820" y="460" width="80" height="85" rx="6" fill="#f1f5f9" />
  <rect x="830" y="470" width="60" height="10" rx="3" fill="#cbd5e1" />
  <rect x="830" y="490" width="40" height="8" rx="3" fill="#cbd5e1" />


  <!-- Footer -->
  <text x="960" y="630" font-size="14" font-weight="bold" fill="#94a3b8" text-anchor="end">@alhrkn</text>

</svg>
