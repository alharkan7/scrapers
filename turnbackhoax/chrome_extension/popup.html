<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>TurnBackHoax Scraper</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 320px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
        }

        h1 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #00d4ff;
            text-align: center;
        }

        .status {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .status-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .status-value {
            color: #fff;
            font-weight: 500;
        }

        .count {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .count-item {
            flex: 1;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .count-number {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }

        .count-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        #scrapeBtn {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #000;
        }

        #scrapeBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
        }

        #scrapeBtn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #downloadBtn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #downloadBtn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #clearBtn {
            background: transparent;
            color: #ff6b6b;
            font-size: 12px;
            padding: 8px;
        }

        #clearBtn:hover {
            background: rgba(255, 107, 107, 0.1);
        }

        .message {
            font-size: 12px;
            padding: 8px;
            border-radius: 4px;
            margin-top: 8px;
            text-align: center;
        }

        .message.success {
            background: rgba(0, 255, 100, 0.1);
            color: #00ff64;
        }

        .message.error {
            background: rgba(255, 100, 100, 0.1);
            color: #ff6464;
        }

        .message.warning {
            background: rgba(255, 200, 0, 0.1);
            color: #ffc800;
        }
    </style>
</head>

<body>
    <h1>📰 TurnBackHoax Scraper</h1>

    <div class="status">
        <div class="status-label">Current Page</div>
        <div class="status-value" id="pageInfo">Checking...</div>
    </div>

    <div class="count">
        <div class="count-item">
            <div class="count-number" id="pageCount">0</div>
            <div class="count-label">On Page</div>
        </div>
        <div class="count-item">
            <div class="count-number" id="totalCount">0</div>
            <div class="count-label">Total Saved</div>
        </div>
    </div>

    <button id="scrapeBtn">💾 Save This Page</button>
    <button id="downloadBtn">📥 Download CSV</button>
    <button id="clearBtn">🗑️ Clear All Data</button>

    <div id="message"></div>

    <script src="popup.js"></script>
</body>

</html>
